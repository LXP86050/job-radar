name: Daily Job Radar

on:
  schedule:
    # Every 2 hours during US waking hours (covers EDT + EST).
    # 09,11,13,15,17,19,21,23,01 UTC = 5am, 7am, 9am, 11am, 1pm, 3pm, 5pm, 7pm, 9pm ET-ish
    # main.py has a once-per-window guard; FORCE_RUN=1 bypasses it.
    - cron: '0 9,11,13,15,17,19,21,23,1 * * *'
  workflow_dispatch: {}   # manual trigger from the Actions UI

permissions:
  contents: write   # to commit state/ back to the repo

concurrency:
  group: job-radar-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      ATS_THRESHOLD: '50'
      # 2-hour schedules bypass the once-per-day guard; treat each cron tick as forced.
      FORCE_RUN: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: AI / SWE radar (no email — sent later with PDFs)
        env:
          PROFILE_PATH: data/resume_profile.json
          PROFILE_NAME: 'Job Radar'
          STATE_DIR: state/ai_swe
          NO_EMAIL: '1'
        run: python -m src.main

      - name: IT radar
        if: always()
        env:
          PROFILE_PATH: data/it_profile.json
          PROFILE_NAME: 'IT Radar'
          STATE_DIR: state/it
          NO_EMAIL: '1'
        run: python -m src.main

      - name: High-Pay IT radar
        if: always()
        env:
          PROFILE_PATH: data/it_high_pay_profile.json
          PROFILE_NAME: 'High-Pay IT Radar'
          STATE_DIR: state/it_high_pay
          ATS_THRESHOLD: '50'
          NO_EMAIL: '1'
        run: python -m src.main

      - name: Setup Node (for resume tailorer)
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install resume builder deps (docx + Playwright)
        if: always()
        working-directory: data/resume
        run: |
          npm install
          npm install playwright
          # --with-deps installs the system libs (libnss3, libgbm1, etc.) Chromium needs
          npx playwright install --with-deps chromium

      - name: Tailor resume per match (90-95% coverage)
        if: always()
        env:
          TAILOR_PROFILE: job-radar
          TAILOR_MAX: '200'
        run: |
          if [[ ! -f "state/matches/$(date +%Y-%m-%d)-job-radar.json" ]]; then
            echo "No matches file — radar didn't write one. Skipping tailoring."
            exit 0
          fi
          node apply/tailor-matches.js

      - name: Send digest emails (50 PDFs per chunk)
        if: always()
        env:
          DIGEST_PROFILE: job-radar
          DIGEST_CHUNK_SIZE: '50'
        run: python -m src.send_digest

      - name: Upload tailored resumes as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tailored-resumes-${{ github.run_id }}
          path: state/tailored/
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit updated state
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "state: update seen/last-run/applied [skip ci]"
            git push
          else
            echo "no state changes"
          fi
