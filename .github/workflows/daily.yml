name: Daily Job Radar

on:
  schedule:
    # Two crons cover DST: 11:00 UTC = 7am EDT (summer), 12:00 UTC = 7am EST (winter).
    # The script's hour check ensures only the correct one actually sends.
    - cron: '0 11 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass the 7am-ET hour check and the once-per-day guard'
        required: false
        default: 'false'
      dry_run:
        description: 'Force auto-applier into DRY-RUN (logs without submitting)'
        required: false
        default: 'false'

permissions:
  contents: write   # to commit state/ back to the repo

concurrency:
  group: job-radar-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      ATS_THRESHOLD: '85'
      FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: AI / SWE radar
        env:
          PROFILE_PATH: data/resume_profile.json
          PROFILE_NAME: 'Job Radar'
          STATE_DIR: state/ai_swe
        run: python -m src.main

      - name: IT radar
        if: always()   # run even if the SWE radar email failed
        env:
          PROFILE_PATH: data/it_profile.json
          PROFILE_NAME: 'IT Radar'
          STATE_DIR: state/it
        run: python -m src.main

      - name: High-Pay IT radar
        if: always()
        env:
          PROFILE_PATH: data/it_high_pay_profile.json
          PROFILE_NAME: 'High-Pay IT Radar'
          STATE_DIR: state/it_high_pay
          ATS_THRESHOLD: '50'
        run: python -m src.main

      - name: Setup Node (for auto-applier)
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install applier deps + Playwright Chromium
        if: always()
        working-directory: apply
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Auto-apply to AI/SWE Greenhouse matches
        if: always()
        env:
          PORTAL_PASSWORD: ${{ secrets.PORTAL_PASSWORD }}
          AUTO_APPLY_PROFILE: job-radar
          # Set AUTO_APPLY_DRY_RUN=1 via workflow_dispatch input to force dry-run
          AUTO_APPLY_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          AUTO_APPLY_MAX: '30'
        run: |
          if [[ ! -f "state/matches/$(date +%Y-%m-%d)-job-radar.json" ]]; then
            echo "No matches file for today — radar didn't write one. Skipping auto-apply."
            exit 0
          fi
          node apply/run-daily.js

      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applier-screenshots-${{ github.run_id }}
          path: state/screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit updated state
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "state: update seen/last-run/applied [skip ci]"
            git push
          else
            echo "no state changes"
          fi
